syntax = "proto3";
package celestia.forwarding.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/celestiaorg/celestia-app/x/forwarding/types";

// Msg defines the forwarding Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // Forward forwards the token bound to a derived forwarding address
  // to its committed destination via Hyperlane warp transfer.
  rpc Forward(MsgForward) returns (MsgForwardResponse);
}

// MsgForward is a permissionless message to trigger token forwarding.
// Anyone can submit this message to forward tokens at the derived address.
// The signer (relayer) pays both Celestia gas and Hyperlane IGP fees.
message MsgForward {
  option (cosmos.msg.v1.signer) = "signer";

  // signer is the address paying for gas and IGP fees (typically a relayer).
  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // forward_addr is the derived forwarding address (bech32).
  string forward_addr = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // dest_domain is the destination chain domain ID.
  uint32 dest_domain = 3;

  // dest_recipient is the recipient on destination chain (32 bytes, hex-encoded, 0x prefix optional).
  string dest_recipient = 4;

  // token_id is the Hyperlane token identifier this forwarding request is bound to.
  string token_id = 5;

  // max_igp_fee is the maximum Hyperlane IGP fee the relayer will pay for this forwarding.
  // The actual fee charged is the lesser of max_igp_fee and the quoted fee.
  // Required: relayer must provide sufficient fee for the transfer.
  cosmos.base.v1beta1.Coin max_igp_fee = 6 [(gogoproto.nullable) = false];
}

// MsgForwardResponse is the response for MsgForward.
message MsgForwardResponse {
  // denom is the token denomination.
  string denom = 1;

  // amount is the amount forwarded.
  string amount = 2 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // message_id is the Hyperlane message ID.
  string message_id = 3;
}
