name: Arabica Load Test

# Runs the Arabica load test (TestArabicaLoad) against the live Arabica devnet.
# Triggers on every push to the load-test branch, and on manual dispatch where
# the load parameters can be tuned. Requires the ARABICA_PRIV_KEY repo secret
# (a funded Arabica account); without it the test skips.
on:
  push:
    branches:
      - nina/arabica-load-test
  workflow_dispatch:
    inputs:
      test-duration:
        description: "Total test duration (Go duration, e.g. 10m)"
        required: false
        type: string
      blob-size:
        description: "Blob size in bytes (default 5 MiB)"
        required: false
        type: string
      submission-delay:
        description: "Delay between submissions (Go duration, e.g. 250ms)"
        required: false
        type: string

concurrency:
  group: arabica-load-test
  cancel-in-progress: true

jobs:
  arabica-load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 #v6.0.0
        with:
          go-version-file: "go.mod"

      # CELESTIA_TAG defaults to the short HEAD sha in the Makefile and is
      # exported to both targets below, so the built image and the test agree
      # on the latency-monitor tag automatically.
      - name: Build latency-monitor Docker image
        run: make latency-monitor-build-docker

      - name: Run TestArabicaLoad
        run: make test-docker-e2e test=TestArabicaLoad
        env:
          ARABICA_PRIV_KEY: ${{ secrets.ARABICA_PRIV_KEY }}
          ARABICA_TEST_DURATION: ${{ inputs.test-duration }}
          ARABICA_BLOB_SIZE: ${{ inputs.blob-size }}
          ARABICA_SUBMISSION_DELAY: ${{ inputs.submission-delay }}

      - name: Upload latency-monitor logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: latency-monitor-logs
          path: test/docker-e2e/latency-monitor.log
          if-no-files-found: warn
          retention-days: 7
