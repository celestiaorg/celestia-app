name: Nightly Tests

concurrency:
  group: nightly-tests
  cancel-in-progress: true

on:
  schedule:
    # run nightly at 2 AM UTC
    - cron: "0 2 * * *"
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to test (leave empty to use commit SHA)"
        required: false
        type: string

jobs:
  build-e2e-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: ${{ inputs.tag == '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: ${{ inputs.tag == '' }}
        run: docker build -t "ghcr.io/celestiaorg/celestia-app:${{ steps.tag.outputs.value }}" . -f docker/multiplexer.Dockerfile

      - name: Save Docker image as artifact
        if: ${{ inputs.tag == '' }}
        run: docker save "ghcr.io/celestiaorg/celestia-app:${{ steps.tag.outputs.value }}" | gzip > /tmp/e2e-image.tar.gz

      - name: Upload Docker image artifact
        if: ${{ inputs.tag == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: e2e-image
          path: /tmp/e2e-image.tar.gz
          retention-days: 1

    outputs:
      tag: ${{ steps.tag.outputs.value }}

  # Build the latency-monitor image once and share it with every test that
  # needs it via an artifact, rather than rebuilding it in each matrix job.
  build-latency-monitor-image:
    needs: build-e2e-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Build latency-monitor Docker image
        run: >-
          docker build
          -t "ghcr.io/celestiaorg/latency-monitor:${{ needs.build-e2e-image.outputs.tag }}"
          -f docker/latency-monitor/Dockerfile .

      - name: Save Docker image as artifact
        run: docker save "ghcr.io/celestiaorg/latency-monitor:${{ needs.build-e2e-image.outputs.tag }}" | gzip > /tmp/latency-monitor-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: latency-monitor-image
          path: /tmp/latency-monitor-image.tar.gz
          retention-days: 1

  test-nightly:
    needs: [build-e2e-image, build-latency-monitor-image]
    runs-on: ubuntu-latest
    # Generous budget so the retried sync test (up to 3 attempts) has headroom
    # without prematurely killing the long-running upgrade/tx tests.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # TestSyncToTipMocha syncs against the live mocha testnet and can
          # intermittently stall when no connected peer is serving a usable
          # state-sync snapshot. Retry it before failing the nightly. Other
          # tests default to a single attempt so real failures aren't masked.
          - test: TestSyncToTipMocha
            max-attempts: 3
          - test: TestAllUpgrades
          # TestTxSubmission asserts a wall-clock average tx-inclusion latency
          # bound. On shared GitHub-hosted runners a single run can occasionally
          # see sustained CPU contention that inflates latency well above the
          # threshold (e.g. 17s avg vs the usual ~4.6s). A genuine latency
          # regression shifts the whole distribution and fails every attempt,
          # so a retry de-flakes transient runner noise without masking it.
          - test: TestTxSubmission
            max-attempts: 2
            extra-image: true
          - test: TestArabicaLoad
            extra-image: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 #v6.0.0
        with:
          go-version-file: "go.mod"

      - name: Download Docker image artifact
        if: ${{ inputs.tag == '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: e2e-image
          path: /tmp

      - name: Load Docker image
        if: ${{ inputs.tag == '' }}
        run: docker load < /tmp/e2e-image.tar.gz

      - name: Download latency-monitor image artifact
        if: ${{ matrix.extra-image }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: latency-monitor-image
          path: /tmp

      - name: Load latency-monitor Docker image
        if: ${{ matrix.extra-image }}
        run: docker load < /tmp/latency-monitor-image.tar.gz

      - name: Run ${{ matrix.test }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          # Per-attempt cap; comfortably above a single run of any nightly test.
          timeout_minutes: 30
          # Defaults to 1 attempt (no retry) for tests that don't opt in.
          max_attempts: ${{ matrix.max-attempts || 1 }}
          command: make test-docker-e2e test=${{ matrix.test }}
        env:
          CELESTIA_IMAGE: ghcr.io/celestiaorg/celestia-app
          CELESTIA_TAG: ${{ needs.build-e2e-image.outputs.tag }}
          ARABICA_PRIV_KEY: ${{ secrets.ARABICA_PRIV_KEY }}
          CELESTIA_APP_VERSION: ${{ needs.build-e2e-image.outputs.tag }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_USERNAME: ${{ secrets.PUSHGATEWAY_USERNAME }}
          PUSHGATEWAY_PASSWORD: ${{ secrets.PUSHGATEWAY_PASSWORD }}

  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 #v6.0.0
        with:
          go-version-file: "go.mod"

      - name: Run tests in race mode
        run: make test-race

  # WARNING: Required job — a defense line against codec / wire-format bugs,
  # including the fibre scatter codec. The fuzz targets live in
  # scripts/test_fuzz.sh. Do NOT remove or disable this job; doing so re-opens
  # https://github.com/celestiaorg/celestia-app/issues/7392.
  test-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 #v6.0.0
        with:
          go-version-file: "go.mod"

      - name: Run fuzz tests
        run: make test-fuzz

  notify-slack-on-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [test-nightly, test-race, test-fuzz]
    if: ${{ always() && (needs.test-nightly.result == 'failure' || needs.test-race.result == 'failure' || needs.test-fuzz.result == 'failure') }}
    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "test-nightly tests failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
