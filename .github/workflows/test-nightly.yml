name: Nightly Tests

concurrency:
  group: nightly-tests
  cancel-in-progress: true

on:
  schedule:
    # run nightly at 2 AM UTC
    - cron: "0 2 * * *"
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to test (leave empty to use commit SHA)"
        required: false
        type: string

jobs:
  build-e2e-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: ${{ inputs.tag == '' }}
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6.0.0

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: ${{ inputs.tag == '' }}
        run: docker build -t "ghcr.io/celestiaorg/celestia-app:${{ steps.tag.outputs.value }}" . -f docker/multiplexer.Dockerfile

      - name: Save Docker image as artifact
        if: ${{ inputs.tag == '' }}
        run: docker save "ghcr.io/celestiaorg/celestia-app:${{ steps.tag.outputs.value }}" | gzip > /tmp/e2e-image.tar.gz

      - name: Upload Docker image artifact
        if: ${{ inputs.tag == '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: e2e-image
          path: /tmp/e2e-image.tar.gz
          retention-days: 1

    outputs:
      tag: ${{ steps.tag.outputs.value }}

  test-nightly:
    needs: build-e2e-image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - test: TestSyncToTipMocha
          - test: TestAllUpgrades
          - test: TestTxSubmission
            extra-image: true
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 #v6.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 #v6.0.0
        with:
          go-version-file: "go.mod"

      - name: Download Docker image artifact
        if: ${{ inputs.tag == '' }}
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #v8.0.0
        with:
          name: e2e-image
          path: /tmp

      - name: Load Docker image
        if: ${{ inputs.tag == '' }}
        run: docker load < /tmp/e2e-image.tar.gz

      - name: Build latency-monitor Docker image
        if: ${{ matrix.extra-image }}
        run: >-
          docker build
          -t "ghcr.io/celestiaorg/latency-monitor:${{ needs.build-e2e-image.outputs.tag }}"
          -f docker/latency-monitor/Dockerfile .

      - name: Run ${{ matrix.test }}
        run: make test-docker-e2e test=${{ matrix.test }}
        env:
          CELESTIA_IMAGE: ghcr.io/celestiaorg/celestia-app
          CELESTIA_TAG: ${{ needs.build-e2e-image.outputs.tag }}

  notify-slack-on-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [test-nightly]
    if: ${{ always() && needs.test-nightly.result == 'failure' }}
    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "test-nightly tests failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
