version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - copyloopvar
    - gocritic
    - misspell
    - modernize
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # tools/talis uses a generic ptr() helper to turn string/bool/int literals
      # into pointers for GCP API calls. The modernize/newexpr check flags these,
      # but new() doesn't accept values in Go, so the helper is the idiomatic fix.
      - path: tools/talis/google_cloud\.go
        linters:
          - modernize
  settings:
    nakedret:
      # Ban the use of naked returns as they decrease code readability
      # Make an issue if func has more lines of code than this setting, and it has naked returns.
      max-func-lines: 0 # Default: 30
    revive:
      severity: warning
      rules:
        - name: redundant-import-alias

formatters:
  enable:
    - gci
    - gofumpt
  exclusions:
    # Sources are excluded if they contain lines like `autogenerated file`, `code generated`, `do not edit`. (e.g. .pb.go files)
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
