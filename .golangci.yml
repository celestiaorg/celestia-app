run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - copyloopvar
    - gofumpt
    - misspell
    - nakedret
    - revive
    - prealloc
    - stylecheck
    - unconvert
    - gocritic

linters-settings:
  nakedret:
    # Ban the use of naked returns because they reduce code readability.
    max-func-lines: 0 # override the default: 30
  revive:
    confidence: 0.8
    ignore-generated-header: true
    severity: warning
    rules:
      - name: redundant-import-alias
